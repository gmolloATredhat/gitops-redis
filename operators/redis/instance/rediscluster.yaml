apiVersion: redis.redis.opstreelabs.in/v1beta1
kind: RedisCluster
metadata:
  name: example-redis
  namespace: gianfranco
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  clusterSize: 3

  kubernetesConfig:
    image: redis:6.2
    imagePullPolicy: IfNotPresent
